<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal Trend Analyzer - Trend Analysis Mockup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="analysis.css">
</head>
<body>
    <div class="container">
        <!-- App Header -->
        <div class="app-header">
            <i class="fa-solid fa-chart-line" style="color: var(--accent-cyan); font-size: 24px;"></i>
            <span class="app-title-gradient">Publication Trends</span>
        </div>
        <p class="sub-title">Yearly growth trends of publications</p>

        <!-- Main analysis scroll body -->
        <div class="analysis-scroll">
            
            <div class="keyword-tag">Keyword: Artificial Intelligence</div>

            <!-- Peak Year Card -->
            <div class="glass-card peak-card">
                <div class="peak-icon-container">
                    <i class="fa-solid fa-fire"></i>
                </div>
                <div>
                    <div class="peak-meta-title">Peak Research Year</div>
                    <div class="peak-meta-value">2023 (1,280 publications)</div>
                </div>
            </div>

            <!-- Timeline Analysis Section -->
            <div class="chart-title">Timeline Analysis</div>
            <div class="glass-card chart-box">
                <!-- Inline SVG Chart Mockup -->
                <svg class="chart-svg" viewBox="0 0 400 220">
                    <defs>
                        <!-- Glow Gradient for Line -->
                        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="var(--accent-cyan)" />
                            <stop offset="100%" stop-color="var(--accent-violet)" />
                        </linearGradient>
                        <!-- Below Area Fill Gradient -->
                        <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="var(--accent-cyan)" stop-opacity="0.2" />
                            <stop offset="100%" stop-color="var(--accent-violet)" stop-opacity="0.01" />
                        </linearGradient>
                    </defs>

                    <!-- Horizontal Grid lines -->
                    <line x1="40" y1="30" x2="380" y2="30" stroke="#1e293b" stroke-dasharray="4" />
                    <line x1="40" y1="80" x2="380" y2="80" stroke="#1e293b" stroke-dasharray="4" />
                    <line x1="40" y1="130" x2="380" y2="130" stroke="#1e293b" stroke-dasharray="4" />
                    <line x1="40" y1="180" x2="380" y2="180" stroke="#334155" />

                    <!-- Y-Axis labels -->
                    <text x="30" y="34" text-anchor="end" class="chart-axis-label">1500</text>
                    <text x="30" y="84" text-anchor="end" class="chart-axis-label">1000</text>
                    <text x="30" y="134" text-anchor="end" class="chart-axis-label">500</text>
                    <text x="30" y="184" text-anchor="end" class="chart-axis-label">0</text>

                    <!-- X-Axis Labels -->
                    <text x="40" y="202" text-anchor="middle" class="chart-axis-label">2018</text>
                    <text x="125" y="202" text-anchor="middle" class="chart-axis-label">2019</text>
                    <text x="210" y="202" text-anchor="middle" class="chart-axis-label">2020</text>
                    <text x="295" y="202" text-anchor="middle" class="chart-axis-label">2021</text>
                    <text x="380" y="202" text-anchor="middle" class="chart-axis-label">2022</text>

                    <!-- Chart Filled Area under line -->
                    <path d="M 40 180 L 40 160 Q 80 130 125 140 T 210 110 T 295 70 T 380 40 L 380 180 Z" fill="url(#areaGrad)" />

                    <!-- Curved Trend Line -->
                    <path d="M 40 160 Q 80 130 125 140 T 210 110 T 295 70 T 380 40" fill="none" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" />

                    <!-- Glowing Data points -->
                    <circle cx="40" cy="160" r="5" fill="var(--accent-cyan)" stroke="#0f172a" stroke-width="2" />
                    <circle cx="125" cy="140" r="5" fill="var(--accent-cyan)" stroke="#0f172a" stroke-width="2" />
                    <circle cx="210" cy="110" r="5" fill="#5885ec" stroke="#0f172a" stroke-width="2" />
                    <circle cx="295" cy="70" r="5" fill="var(--accent-violet)" stroke="#0f172a" stroke-width="2" />
                    <circle cx="380" cy="40" r="5" fill="var(--accent-violet)" stroke="#0f172a" stroke-width="2" />
                </svg>
            </div>

        </div>

        <!-- Emulator Bottom Navigation -->
        <div class="bottom-nav">
            <a href="search.html" class="nav-item">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </a>
            <a href="analysis.html" class="nav-item active">
                <i class="fa-solid fa-chart-line"></i>
                <span>Trends</span>
            </a>
            <a href="dashboard.html" class="nav-item">
                <i class="fa-solid fa-circle-info"></i>
                <span>Dashboard</span>
            </a>
        </div>
    </div>
</body>
</html>
