name: journal_trend_analyzer
description: A Journal Trend Analysis mobile application using Flutter and OpenAlex API.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Styling
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.7.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.5

  # Navigation & Routing
  go_router: ^13.2.0

  # State Management & Dependency Injection
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  equatable: ^2.0.5

  # Networking & Caching
  dio: ^5.4.0
  dio_cache_interceptor: ^3.4.4
  dio_cache_interceptor_hive_store: ^3.2.2
  path_provider: ^2.1.2

  # Charts & Visualizations
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  mocktail: ^1.0.3

flutter:
  uses-material-design: true
